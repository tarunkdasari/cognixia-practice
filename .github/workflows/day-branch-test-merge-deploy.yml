name: Test Day Branch, Merge to Main, Deploy Lambda

on:
  push:
    branches:
      - "day-*"

permissions:
  contents: write

concurrency:
  group: day-branch-test-merge-deploy
  cancel-in-progress: false

jobs:
  test-merge-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the day-* branch that triggered this workflow
      - name: Checkout day branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies for testing
      - name: Install test dependencies
        working-directory: fast-api-task
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      # 4. Run tests from fast-api-task
      - name: Run tests
        working-directory: fast-api-task
        env:
          PYTHONPATH: ${{ github.workspace }}/fast-api-task
        run: |
          python -c "import customers; print(customers.__file__)"
          pytest tests

      # 5. Configure Git so GitHub Actions can commit/merge
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 6. Merge tested day-* branch into main
      - name: Promote tested branch to main
        run: |
          CURRENT_BRANCH="${GITHUB_REF_NAME}"

          git fetch origin main
          git fetch origin "$CURRENT_BRANCH"

          git checkout main
          git pull origin main

          git merge --no-ff "origin/$CURRENT_BRANCH" -m "Promote $CURRENT_BRANCH to main after passing tests"

          git push origin main

      # 7. Build Lambda deployment package from the tested code
      - name: Build Lambda deployment package
        run: |
          rm -rf package lambda_deploy.zip
          mkdir package

          python -m pip install --upgrade pip
          pip install -r fast-api-task/requirements.txt -t package

          cp fast-api-task/*.py package/

          cd package
          zip -r ../lambda_deploy.zip .

      # 8. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 9. Deploy to AWS Lambda
      - name: Deploy zip to Lambda
        run: |
          aws lambda update-function-code \
            --function-name student-tarun-krishna-dasari-bank-api-lambda \
            --zip-file fileb://lambda_deploy.zip